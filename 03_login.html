<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurboChain — Login</title>
<link rel="stylesheet" href="shared.css">
<style>
  .login-header { padding-top:30px; margin-bottom:32px; }
  .logo-small { width:52px; height:52px; background:linear-gradient(135deg,var(--accent2),var(--accent)); border-radius:16px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; box-shadow:0 8px 24px rgba(0,132,61,.2); }
  .logo-small svg { width:26px; height:26px; color:#fff; }
  .login-title { font-weight:800; font-size:28px; margin-bottom:6px; }
  .login-sub { font-size:14px; color:var(--muted); }
  .biometric-btn { width:100%; padding:15px; background:var(--surface); border:1.5px solid var(--accent); border-radius:var(--r-md); display:flex; align-items:center; justify-content:center; gap:10px; cursor:pointer; color:var(--accent); font-weight:600; font-size:15px; margin-bottom:8px; }
  .biometric-btn svg { width:22px; height:22px; }
  .wallet-option { width:100%; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); display:flex; align-items:center; gap:14px; cursor:pointer; margin-bottom:20px; box-shadow:var(--shadow-sm); }
  .wallet-logo { width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,var(--accent2),var(--accent)); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .wallet-logo svg { width:20px; height:20px; color:#fff; }
  .wallet-info { flex:1; }
  .wallet-name { font-weight:600; font-size:14px; }
  .wallet-addr { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); }
  .security-row { display:flex; align-items:center; gap:10px; background:var(--accent-l); border:1px solid #C6E9D6; border-radius:var(--r-sm); padding:12px 14px; margin-bottom:20px; }
  .security-row svg { width:18px; height:18px; color:var(--accent); flex-shrink:0; }
  .security-text { font-size:12px; color:var(--accent2); font-weight:500; }
  .forgot { text-align:right; font-size:12px; color:var(--accent); margin-top:-6px; margin-bottom:20px; cursor:pointer; font-weight:500; }
  .register-link { text-align:center; font-size:13px; color:var(--muted); margin-top:20px; }
  .register-link a { color:var(--accent); text-decoration:none; font-weight:600; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><div class="status-icons"><div class="signal"><span></span><span></span><span></span></div><span>WiFi</span></div></div>

  <div class="screen">
    <div class="login-header">
      <div class="logo-small"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg></div>
      <div class="login-title">Bienvenido de vuelta</div>
      <div class="login-sub">Ingresa a tu cuenta TurboChain</div>
    </div>

    <div class="biometric-btn">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M7.864 4.243A7.5 7.5 0 0119.5 10.5c0 2.92-.556 5.709-1.568 8.268M5.742 6.364A7.465 7.465 0 004.5 10.5a48.667 48.667 0 00-1.26 8.303M12 10.5a3 3 0 11-6 0 3 3 0 016 0zm0 0v1.5a1.5 1.5 0 003 0V10.5"/></svg>
      Acceso con biometría
    </div>

    <div class="divider">o con tu correo</div>

    <div class="input-group">
      <span class="input-label">Correo corporativo</span>
      <input class="input-field" type="email" placeholder="ops@aerolinea.com" value="carlos@operador.com">
    </div>
    <div class="input-group">
      <span class="input-label">Contraseña</span>
      <div style="position:relative">
        <input class="input-field" type="password" value="••••••••••" style="padding-right:48px">
        <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted)"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg></span>
      </div>
    </div>
    <div class="forgot">¿Olvidaste tu contraseña?</div>

    <div class="security-row">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
      <span class="security-text">2FA activo — Cuenta protegida</span>
    </div>

    <button class="btn-primary" onclick="location.href='05_home.html'">Iniciar sesión</button>

    <div class="divider">o conecta tu wallet</div>

    <div class="wallet-option">
      <div class="wallet-logo"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a2.25 2.25 0 00-2.25-2.25H15a3 3 0 110-6h.75A2.25 2.25 0 0118 6M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M3 16.5V6.75A2.25 2.25 0 015.25 4.5h13.5A2.25 2.25 0 0121 6.75v9.75M3 16.5h18"/></svg></div>
      <div class="wallet-info">
        <div class="wallet-name">MetaMask</div>
        <div class="wallet-addr">0x3F4...8aB2</div>
      </div>
      <span style="color:var(--muted)">›</span>
    </div>

    <div class="register-link">¿No tienes cuenta? <a href="02_register.html">Regístrate aquí</a></div>
  </div>
</div>
</body>
</html>
