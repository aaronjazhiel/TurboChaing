<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurboChain — Registro</title>
<link rel="stylesheet" href="shared.css">
<style>
  .top-bar { display:flex; align-items:center; gap:12px; padding:18px 24px 0; }
  .back-btn { width:38px; height:38px; background:var(--surface); border:1px solid var(--border); border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .back-btn svg { width:18px; height:18px; color:var(--text); }
  .top-title { font-weight:700; font-size:17px; }
  .steps-bar { display:flex; justify-content:center; padding:16px 0 4px; }
  .section-title { font-weight:800; font-size:24px; margin-bottom:6px; }
  .section-sub { font-size:13px; color:var(--muted); margin-bottom:24px; }
  .input-icon-wrap { position:relative; }
  .input-icon-wrap .input-field { padding-right:48px; }
  .input-end-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--muted); }
  .input-end-icon svg { width:18px; height:18px; }
  .password-strength { margin-top:8px; display:flex; gap:4px; }
  .strength-bar { flex:1; height:3px; border-radius:100px; background:var(--surface2); }
  .strength-bar.fill-3 { background:var(--accent); }
  .terms-row { display:flex; align-items:flex-start; gap:12px; padding:4px 0 24px; }
  .checkbox { width:20px; height:20px; flex-shrink:0; background:var(--accent); border:none; border-radius:6px; display:flex; align-items:center; justify-content:center; margin-top:2px; }
  .checkbox svg { width:12px; height:12px; color:#fff; }
  .terms-text { font-size:12px; color:var(--muted); line-height:1.5; }
  .terms-text a { color:var(--accent); text-decoration:none; }
  .already { text-align:center; font-size:13px; color:var(--muted); margin-top:16px; }
  .already a { color:var(--accent); text-decoration:none; font-weight:600; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><div class="status-icons"><div class="signal"><span></span><span></span><span></span></div><span>WiFi</span></div></div>

  <div class="top-bar">
    <div class="back-btn" onclick="history.back()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg></div>
    <div class="top-title">Registro de operador</div>
  </div>
  <div class="steps-bar"><div class="steps"><div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div></div></div>

  <div class="screen">
    <div class="section-title">Crear cuenta</div>
    <div class="section-sub">Regístrate como operador de aerolínea para pagar turbosina con tokens</div>

    <div class="input-group">
      <span class="input-label">Nombre del operador</span>
      <div class="input-icon-wrap">
        <input class="input-field" type="text" placeholder="Ej. Aviación del Pacífico">
        <span class="input-end-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/></svg></span>
      </div>
    </div>

    <div class="input-group">
      <span class="input-label">Correo corporativo</span>
      <div class="input-icon-wrap">
        <input class="input-field" type="email" placeholder="ops@aerolinea.com">
        <span class="input-end-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg></span>
      </div>
    </div>

    <div class="input-group">
      <span class="input-label">Código IATA de aerolínea</span>
      <div class="input-icon-wrap">
        <input class="input-field" type="text" placeholder="Ej. AM" maxlength="3" style="text-transform:uppercase">
        <span class="input-end-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg></span>
      </div>
    </div>

    <div class="input-group">
      <span class="input-label">Contraseña</span>
      <div class="input-icon-wrap">
        <input class="input-field" type="password" placeholder="Mínimo 8 caracteres" value="SecurePass1!">
        <span class="input-end-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg></span>
      </div>
      <div class="password-strength"><div class="strength-bar fill-3"></div><div class="strength-bar fill-3"></div><div class="strength-bar fill-3"></div><div class="strength-bar"></div></div>
    </div>

    <div class="terms-row">
      <div class="checkbox"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg></div>
      <div class="terms-text">Acepto los <a href="#">Términos de servicio</a> y la <a href="#">Política de privacidad</a> de TurboChain</div>
    </div>

    <button class="btn-primary" onclick="location.href='04_wallet_setup.html'">Continuar</button>

    <div class="already">¿Ya tienes cuenta? <a href="03_login.html">Inicia sesión</a></div>
  </div>
</div>
</body>
</html>
